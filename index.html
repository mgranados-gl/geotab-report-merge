<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Geotab Dual Report Export</title>
  <link rel="stylesheet" href="./styles.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
</head>
<body>
  <div class="beta-banner">⚠️ Beta Version — Not Ready for Production Use</div>
  
  <main class="container">
    <h1>Geotab Dual Report Export</h1>
    <p class="subtitle">Pull HosLog and ExceptionsDetail reports, merge with template, export to Excel.</p>

    <section class="card">
      <h2>Export Settings</h2>
      <label>
        Output File Name
        <input id="fileName" type="text" value="geotab-export.xlsx" />
      </label>
    </section>

    <section class="card">
      <h2>Search Filters</h2>
      
      <div class="grid two-col">
        <label>
          Date Preset
          <select id="presetSelect">
            <option value="custom">Custom</option>
            <option value="today">Today (UTC)</option>
            <option value="yesterday">Yesterday (UTC)</option>
            <option value="last7" selected>Last 7 Days (UTC)</option>
            <option value="last30">Last 30 Days (UTC)</option>
          </select>
        </label>
      </div>

      <div class="grid two-col">
        <label>
          From Date/Time (UTC)
          <input id="fromDate" type="datetime-local" />
        </label>
        <label>
          To Date/Time (UTC)
          <input id="toDate" type="datetime-local" />
        </label>
      </div>

      <div class="grid two-col">
        <label>
          Exception Rule (hold Ctrl to multi-select)
          <select id="ruleSelect" multiple></select>
        </label>
        <label>
          Asset (hold Ctrl to multi-select)
          <select id="deviceSelect" multiple></select>
        </label>
      </div>

      <label>
        Driver (hold Ctrl to multi-select)
        <select id="driverSelect" multiple></select>
      </label>

      <div class="actions inline-actions">
        <button id="loadFilterBtn" type="button" class="secondary">Refresh Dropdown Data</button>
        <button id="buildSearchBtn" type="button">Build Search JSON</button>
        <button id="clearFilterBtn" type="button" class="secondary">Clear Filters</button>
      </div>
    </section>

    <section class="card">
      <h2>Search JSON (Advanced)</h2>
      <textarea id="searchJson" rows="4" placeholder='{"fromDate": "2026-01-01T00:00:00Z", "toDate": "2026-01-08T00:00:00Z"}'></textarea>
    </section>

    <div class="actions">
      <button id="testBtn" type="button">Test (1 row per report)</button>
      <button id="exportBtn" type="button">Pull Reports & Export Excel</button>
    </div>

    <section class="card">
      <h2>Status</h2>
      <pre id="status">Loading...</pre>
    </section>
  </main>

  <script src="./app.js"></script>
</body>
</html>
