<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Gridline | Gap Report</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="accessBanner" class="access-banner access-banner--pending">
    <span id="bannerText" class="access-banner__text">Checking access…</span>
  </div>
  <main class="shell">
    <header class="report-header">
      <div class="brand-mark">G</div>
      <div class="brand-copy">
        <h1>Gridline | Gap Report</h1>
        <p>Pulls yesterday's HOS logs and exception events into a single Excel workbook.</p>
      </div>
    </header>

    <div class="date-card">
      <span class="date-label-text">Reporting date</span>
      <strong id="dateLabel">—</strong>
    </div>

    <div class="filters-panel">
      <div class="rules-header">
        <span class="rules-title">Filters</span>
      </div>

      <div class="filter-group">
        <div class="rules-header">
          <span class="rules-title">Drivers</span>
          <div class="rules-actions">
            <button id="selectAllDriversBtn" class="btn-link">Select all</button>
            <span class="divider">|</span>
            <button id="clearDriversBtn" class="btn-link">Clear</button>
          </div>
        </div>
        <div id="driversContainer"><p class="hint">Drivers load when opened inside MyGeotab.</p></div>
      </div>
    </div>

    <div class="rules-panel">
      <div class="rules-header">
        <span class="rules-title">Exception Rules</span>
        <div class="rules-actions">
          <button id="selectAllBtn" class="btn-link">Select all</button>
          <span class="divider">|</span>
          <button id="clearAllBtn" class="btn-link">Clear</button>
        </div>
      </div>
      <div id="rulesContainer"><p class="hint">Rules load when opened inside MyGeotab.</p></div>
    </div>

    <div class="action-row">
      <button id="runBtn" class="btn primary">Run Report</button>
    </div>

    <pre id="statusBox" class="status-box">Initializing…</pre>
  </main>

  <script>
    if (typeof geotab === "undefined") { window.geotab = { addin: {} }; }
  </script>
  <script src="https://unpkg.com/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
